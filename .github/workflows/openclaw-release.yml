name: Build OpenClaw Image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      openclawTag:
        default: "2026.3.12"
        description: "OpenClaw Release Tag 2026.3.12, etc."
        required: true
      dockerhubTag:
        default: "2026.3.12"
        description: "Docker Hub Tag"
        required: false
      platforms:
        description: "Platforms"
        default: "linux/amd64,linux/arm64/v8"
        required: true
      pushLatest:
        description: "Push latest tag"
        default: "true"
        required: true

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 登录到 GitHub Container Registry
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Source
        uses: actions/checkout@v4
        with:
          repository: openclaw/openclaw
          ref: ${{ github.event.inputs.openclawTag }}
          path: _src/openclaw

      - name: Prepare Build Files
        run: |
          mkdir -p _src/openclaw/openclaw
          cp Dockerfile _src/openclaw/openclaw/

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/repobor/openclaw
          tags: |
            type=raw,value=${{ github.event.inputs.dockerhubTag || github.event.inputs.openclawTag }}
            type=raw,value=latest,enable=${{ github.event_name == 'push' }}

      - name: Build OpenClaw Image and Push
        uses: docker/build-push-action@v6
        with:
          context: _src/openclaw
          file: _src/openclaw/openclaw/Dockerfile
          platforms: ${{ github.event.inputs.platforms || 'linux/amd64,linux/arm64/v8' }}
          push: true
          build-args: |
            OPENCLAW_INSTALL_BROWSER=true
            OPENCLAW_DOCKER_APT_PACKAGES=ffmpeg build-essential git curl jq bash ca-certificates chromium fonts-liberation fonts-noto-cjk fonts-noto-color-emoji gosu openssh-client procps python3 python3-pip python3-venv python3-requests socat tini unzip websockify
            OPENCLAW_VERSION=${{ github.event.inputs.openclawTag }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
